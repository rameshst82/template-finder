<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TemplateFinder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0e0f13;
    font-family: 'DM Mono', 'Fira Mono', 'Courier New', monospace;
    color: #e8e4db;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0e0f13; }
  ::-webkit-scrollbar-thumb { background: #2a2d35; border-radius: 3px; }

  /* Header */
  header {
    border-bottom: 1px solid #1e2028;
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: #0e0f13;
    z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { color: #f0a500; display: flex; }
  .logo-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; color: #fff; }
  #count-badge { background: #1e2028; color: #888; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-left: 4px; }

  .add-btn {
    display: flex; align-items: center; gap: 8px;
    background: #f0a500; color: #0e0f13;
    border: none; border-radius: 8px;
    padding: 9px 18px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .add-btn:hover { background: #d99400; box-shadow: 0 4px 20px rgba(240,165,0,0.35); }

  /* Main */
  main { max-width: 960px; margin: 0 auto; padding: 36px 24px; }

  /* Search */
  .search-wrap { position: relative; margin-bottom: 28px; }
  .search-wrap .search-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: #555; transition: color 0.15s; pointer-events: none;
  }
  .search-wrap:focus-within .search-icon { color: #f0a500; }
  #search-input {
    width: 100%; background: #14161c;
    border: 1px solid #1e2028; border-radius: 10px;
    padding: 14px 40px 14px 48px;
    color: #e8e4db; font-size: 14px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  #search-input:focus { border-color: #f0a500; }
  #search-clear {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #555; cursor: pointer; padding: 4px;
    display: none;
  }

  /* Category pills */
  #cat-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
  .cat-pill {
    background: #14161c; color: #aaa;
    border: 1px solid #1e2028; border-radius: 6px;
    padding: 6px 14px; font-size: 12px; font-family: inherit;
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .cat-pill:hover { background: #2a2d35; }
  .cat-pill.active { background: #f0a500; color: #0e0f13; border-color: #f0a500; font-weight: 500; }

  /* Grid */
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .tmpl-card {
    background: #14161c; border: 1px solid #1e2028; border-radius: 12px;
    padding: 20px; display: flex; flex-direction: column; gap: 12px;
    cursor: pointer; transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s, background 0.18s;
    position: relative;
  }
  .tmpl-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(240,165,0,0.18); border-color: #f0a500; background: #191b23; }
  .tmpl-card:hover .card-arrow { opacity: 1; transform: translateX(0); }
  .tmpl-card:hover .card-url { color: #f0a500; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .cat-badge {
    background: rgba(240,165,0,0.15); color: #f0a500;
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 6px 14px; border-radius: 8px; font-weight: 600;
    border: 1px solid rgba(240,165,0,0.3);
  }
  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    background: #1e2028; border: none; border-radius: 6px;
    color: #666; padding: 6px 7px; display: flex; cursor: pointer;
    transition: color 0.15s;
  }
  .icon-btn:hover { color: #f0a500; }
  .card-mid { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-name { font-size: 15px; font-weight: 500; color: #fff; line-height: 1.4; }
  .card-arrow {
    color: #f0a500; opacity: 0; transform: translateX(-6px);
    transition: opacity 0.18s, transform 0.18s; flex-shrink: 0;
  }
  .card-url { font-size: 11px; color: #3a3d45; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: color 0.18s; }

  /* Empty state */
  #empty { text-align: center; padding-top: 80px; display: none; }
  #empty .emoji { font-size: 40px; margin-bottom: 16px; }
  #empty p { color: #555; font-size: 14px; }

  /* Overlay */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 50; display: flex; align-items: center; justify-content: center;
    padding: 24px; animation: fadeIn 0.2s ease;
  }
  .modal {
    background: #14161c; border: 1px solid #2a2d35; border-radius: 16px;
    padding: 32px; width: 100%; max-width: 480px;
    animation: slideUp 0.22s ease;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: #fff; }
  .close-btn { background: none; border: none; color: #555; cursor: pointer; padding: 4px; }
  .close-btn:hover { color: #aaa; }
  .form-fields { display: flex; flex-direction: column; gap: 16px; }
  .form-group label { display: block; font-size: 11px; color: #888; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.08em; }
  .form-group input {
    width: 100%; background: #0e0f13; border: 1px solid #2a2d35; border-radius: 8px;
    padding: 11px 14px; color: #e8e4db; font-size: 13px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus { border-color: #f0a500; }
  #form-error { color: #e05c5c; font-size: 12px; display: none; }
  .submit-btn {
    background: #f0a500; color: #0e0f13; border: none; border-radius: 9px;
    padding: 13px; font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; margin-top: 4px; width: 100%;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: #d99400; }

  /* Delete modal */
  .delete-modal { max-width: 380px; text-align: center; }
  .delete-emoji { font-size: 32px; margin-bottom: 12px; }
  .delete-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; margin-bottom: 8px; }
  .delete-msg { color: #888; font-size: 13px; margin-bottom: 24px; }
  .delete-actions { display: flex; gap: 10px; }
  .cancel-btn { flex: 1; background: #1e2028; border: 1px solid #2a2d35; border-radius: 8px; padding: 11px; color: #aaa; font-family: inherit; font-size: 13px; cursor: pointer; }
  .confirm-del-btn { flex: 1; background: #c0392b; border: none; border-radius: 8px; padding: 11px; color: #fff; font-family: inherit; font-size: 13px; cursor: pointer; }

  /* Toast */
  #toast {
    position: fixed; bottom: 28px; right: 28px;
    color: #fff; border-radius: 9px; padding: 12px 20px;
    font-size: 13px; font-family: inherit; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    display: none; animation: toastIn 0.25s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </div>
    <span class="logo-title">TemplateFinder</span>
    <span id="count-badge">0 templates</span>
  </div>
  <button class="add-btn" onclick="openForm()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Template
  </button>
</header>

<!-- Main -->
<main>
  <!-- Search -->
  <div class="search-wrap">
    <div class="search-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <input id="search-input" type="text" placeholder="Search templates by name or category…" oninput="onSearch(this.value)" />
    <button id="search-clear" onclick="clearSearch()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- Category Pills -->
  <div id="cat-pills"></div>

  <!-- Grid -->
  <div id="grid"></div>
  <div id="empty">
    <div class="emoji">📂</div>
    <p id="empty-msg">No templates yet. Add your first one!</p>
  </div>
</main>

<!-- Add/Edit Modal -->
<div id="form-overlay" class="overlay" style="display:none" onclick="handleOverlayClick(event,'form-overlay')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title" id="form-title">Add Template</h2>
      <button class="close-btn" onclick="closeForm()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="form-fields">
      <div class="form-group">
        <label>Template Name</label>
        <input id="f-name" type="text" placeholder="e.g. Invoice Template" />
      </div>
      <div class="form-group">
        <label>Category *</label>
        <input id="f-category" type="text" placeholder="e.g. Finance, HR, Legal…" list="cat-datalist" />
        <datalist id="cat-datalist"></datalist>
      </div>
      <div class="form-group">
        <label>Template URL / Link *</label>
        <input id="f-url" type="text" placeholder="https://…" />
      </div>
      <div id="form-error"></div>
      <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">Add Template</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div id="delete-overlay" class="overlay" style="display:none" onclick="handleOverlayClick(event,'delete-overlay')">
  <div class="modal delete-modal" onclick="event.stopPropagation()">
    <div class="delete-emoji">🗑️</div>
    <div class="delete-title">Delete Template?</div>
    <div class="delete-msg">This action cannot be undone.</div>
    <div class="delete-actions">
      <button class="cancel-btn" onclick="closeDelete()">Cancel</button>
      <button class="confirm-del-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const STORAGE_KEY = 'templatefinder-data';
  let templates = [];
  let activeCategory = 'All';
  let searchQuery = '';
  let editingId = null;
  let deleteTargetId = null;
  let toastTimer = null;

  // --- Storage ---
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      templates = raw ? JSON.parse(raw) : [];
    } catch { templates = []; }
    render();
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(templates));
  }

  // --- Render ---
  function render() {
    updateBadge();
    renderCatPills();
    renderGrid();
  }

  function updateBadge() {
    const el = document.getElementById('count-badge');
    el.textContent = templates.length + ' template' + (templates.length !== 1 ? 's' : '');
  }

  function getCategories() {
    const cats = [...new Set(templates.map(t => t.category).filter(Boolean))].sort();
    return ['All', ...cats];
  }

  function renderCatPills() {
    const cats = getCategories();
    const container = document.getElementById('cat-pills');
    if (cats.length <= 1) { container.innerHTML = ''; return; }
    container.innerHTML = cats.map(cat =>
      `<button class="cat-pill${cat === activeCategory ? ' active' : ''}" onclick="setCategory('${escHtml(cat)}')">${escHtml(cat)}</button>`
    ).join('');
  }

  function renderGrid() {
    const filtered = templates.filter(t => {
      const matchCat = activeCategory === 'All' || t.category === activeCategory;
      const q = searchQuery.toLowerCase();
      const matchSearch = !q || (t.name||'').toLowerCase().includes(q) || t.category.toLowerCase().includes(q);
      return matchCat && matchSearch;
    });

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const emptyMsg = document.getElementById('empty-msg');

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      emptyMsg.textContent = templates.length === 0
        ? 'No templates yet. Add your first one!'
        : 'No templates match your search.';
    } else {
      empty.style.display = 'none';
      grid.innerHTML = filtered.map(t => `
        <div class="tmpl-card" onclick="openUrl('${escAttr(t.url)}')">
          <div class="card-top">
            <span class="cat-badge">${escHtml(t.category)}</span>
            <div class="card-actions">
              <button class="icon-btn" title="Edit" onclick="event.stopPropagation(); openForm('${escAttr(t.id)}')">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="icon-btn" title="Delete" onclick="event.stopPropagation(); openDelete('${escAttr(t.id)}')">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          </div>
          <div class="card-mid">
            <div class="card-name">${escHtml(t.name || '')}</div>
            <div class="card-arrow">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </div>
          </div>
          <div class="card-url">${escHtml(t.url)}</div>
        </div>
      `).join('');
    }
  }

  // --- Actions ---
  function setCategory(cat) {
    activeCategory = cat;
    renderCatPills();
    renderGrid();
  }

  function onSearch(val) {
    searchQuery = val;
    const clearBtn = document.getElementById('search-clear');
    clearBtn.style.display = val ? 'block' : 'none';
    renderGrid();
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    onSearch('');
  }

  function openUrl(url) {
    let href = url;
    if (!/^https?:\/\//i.test(href)) href = 'https://' + href;
    const a = document.createElement('a');
    a.href = href; a.target = '_blank'; a.rel = 'noopener noreferrer';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  // --- Form ---
  function openForm(id) {
    editingId = id || null;
    const t = id ? templates.find(x => x.id === id) : null;
    document.getElementById('f-name').value = t ? t.name : '';
    document.getElementById('f-category').value = t ? t.category : '';
    document.getElementById('f-url').value = t ? t.url : '';
    document.getElementById('form-title').textContent = id ? 'Edit Template' : 'Add Template';
    document.getElementById('submit-btn').textContent = id ? 'Save Changes' : 'Add Template';
    setFormError('');
    // Update datalist
    const dl = document.getElementById('cat-datalist');
    const cats = [...new Set(templates.map(x => x.category).filter(Boolean))].sort();
    dl.innerHTML = cats.map(c => `<option value="${escAttr(c)}">`).join('');
    document.getElementById('form-overlay').style.display = 'flex';
  }

  function closeForm() {
    document.getElementById('form-overlay').style.display = 'none';
    editingId = null;
  }

  function setFormError(msg) {
    const el = document.getElementById('form-error');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  function handleSubmit() {
    const name = document.getElementById('f-name').value.trim();
    const category = document.getElementById('f-category').value.trim();
    const url = document.getElementById('f-url').value.trim();
    if (!category) { setFormError('Category is required.'); return; }
    if (!url) { setFormError('URL / link is required.'); return; }

    if (editingId) {
      templates = templates.map(t => t.id === editingId ? { ...t, name, category, url } : t);
      showToast('Template updated!');
    } else {
      templates.unshift({ id: Date.now().toString(), name, category, url, createdAt: new Date().toISOString() });
      showToast('Template added!');
    }
    save();
    render();
    closeForm();
  }

  // --- Delete ---
  function openDelete(id) {
    deleteTargetId = id;
    document.getElementById('delete-overlay').style.display = 'flex';
  }

  function closeDelete() {
    document.getElementById('delete-overlay').style.display = 'none';
    deleteTargetId = null;
  }

  function confirmDelete() {
    templates = templates.filter(t => t.id !== deleteTargetId);
    save();
    render();
    closeDelete();
    showToast('Template removed.', 'info');
  }

  // --- Overlay click outside ---
  function handleOverlayClick(e, id) {
    if (e.target.id === id) {
      if (id === 'form-overlay') closeForm();
      else closeDelete();
    }
  }

  // --- Toast ---
  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = type === 'error' ? '#c0392b' : type === 'info' ? '#2a2d35' : '#1a7a3a';
    el.style.display = 'block';
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  // --- Escape helpers ---
  function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(str) {
    return String(str||'').replace(/'/g,"\\'");
  }

  // --- Init ---
  load();
</script>
</body>
</html>
